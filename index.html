<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAM ON</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:'Montserrat',sans-serif;
  background:linear-gradient(180deg,#ffb07a,#ff2f87);
  color:white;
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:430px;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;
}

/* TIMER */
.timer-box{
  background:#ff2f87;
  padding:10px 30px;
  border-radius:30px;
  text-align:center;
  position:relative;
}

.dot{
  width:10px;
  height:10px;
  background:lime;
  border-radius:50%;
  position:absolute;
  right:10px;
  top:8px;
}

.timer{
  font-weight:bold;
  letter-spacing:2px;
}

/* HERO */
.hero{
  text-align:center;
}

.date{
  letter-spacing:6px;
  margin-bottom:10px;
}

.title{
  font-family:'Anton';
  font-size:110px;
  line-height:1;
}

.sub{
  letter-spacing:5px;
  margin-top:10px;
}

.brand{
  margin-top:20px;
  font-family:'Anton';
  transform:skewX(-10deg);
  font-size:35px;
}

/* BUTTON */
.capture{
  width:90px;
  height:90px;
  background:white;
  border-radius:50%;
  margin:20px auto;
}

/* CONSENT */
.consent{
  text-align:center;
  font-size:13px;
  margin-top:10px;
}

.consent input{
  width:18px;
  height:18px;
}

/* STATUS */
.status{
  text-align:center;
  font-size:14px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="app">

  <div class="timer-box">
    <div class="dot"></div>
    <div class="timer" id="timer">00:00:00</div>
  </div>

  <div class="hero">
    <div class="date">MAY 8TH</div>
    <div class="title">CAM ON</div>
    <div class="sub">TEQUILA SUNRISE</div>
    <div class="sub">INTERNATIONAL MUSIC VIBES</div>
    <div class="brand">APARTMENT</div>
  </div>

  <div>
    <div class="capture" id="captureBtn"></div>

    <div class="status" id="status">Bitte zuerst zustimmen</div>

    <div class="consent">
      <input type="checkbox" id="consent">
      Ich stimme zu, dass mein Foto gespeichert und auf Instagram genutzt werden darf
    </div>
  </div>

  <input type="file" id="cameraInput" accept="image/*" capture="user" style="display:none">

</div>

<script>
// TIMER
let s=0;
setInterval(()=>{
  s++;
  let h=String(Math.floor(s/3600)).padStart(2,'0');
  let m=String(Math.floor((s%3600)/60)).padStart(2,'0');
  let sec=String(s%60).padStart(2,'0');
  document.getElementById("timer").innerText=`${h}:${m}:${sec}`;
},1000);

// CLOUDINARY DATEN
const CLOUD_NAME="dhl8ywkmb";
const UPLOAD_PRESET="camon_upload";

// ELEMENTE
const btn=document.getElementById("captureBtn");
const input=document.getElementById("cameraInput");
const consent=document.getElementById("consent");
const status=document.getElementById("status");

// KAMERA BUTTON
btn.onclick=()=>{
  if(!consent.checked){
    status.innerText="Bitte zuerst zustimmen";
    return;
  }
  input.click();
};

// UPLOAD
input.onchange=async(e)=>{
  const file=e.target.files[0];
  if(!file) return;

  status.innerText="Upload läuft...";

  const formData=new FormData();
  formData.append("file",file);
  formData.append("upload_preset",UPLOAD_PRESET);

  try{
    await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
      method:"POST",
      body:formData
    });

    status.innerText="Erfolgreich! Weiterleitung...";

    setTimeout(()=>{
      window.location.href="https://www.instagram.com/camonapartment?igsh=MTh1dzNvd3drejloaQ==";
    },1500);

  }catch{
    status.innerText="Fehler beim Upload";
  }
};
</script>

</body>
</html>
