<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAM ON</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  height: 100vh;
  background: linear-gradient(180deg,#ffb07a,#ff2f87);
  display: flex;
  justify-content: center;
  color: white;
}

.app {
  width: 100%;
  max-width: 430px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* TIMER */
.top {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.timer-box {
  background: #ff2f87;
  padding: 10px 35px;
  border-radius: 40px;
  position: relative;
}

.dot {
  width: 10px;
  height: 10px;
  background: lime;
  border-radius: 50%;
  position: absolute;
  right: 12px;
  top: 8px;
}

.timer {
  font-weight: 600;
  letter-spacing: 3px;
}

/* CARD */
.card {
  background: #ff2f87;
  margin: 0 20px;
  border-radius: 30px;
  padding: 40px 20px;
  text-align: center;
}

.date {
  letter-spacing: 8px;
  font-size: 16px;
}

.title {
  font-family: 'Anton', sans-serif;
  font-size: 95px;
  white-space: nowrap;
}

.sub {
  letter-spacing: 6px;
  font-size: 14px;
  margin-top: 10px;
}

.brand {
  margin-top: 25px;
  font-family: 'Anton';
  font-size: 40px;
  transform: skewX(-10deg);
}

/* DSGVO POPUP */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: flex;
  justify-content: center;
  align-items: center;
}

.popup {
  background: white;
  color: black;
  padding: 25px;
  border-radius: 15px;
  width: 85%;
  text-align: center;
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  border: none;
  background: black;
  color: white;
  border-radius: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- DSGVO -->
<div class="overlay" id="overlay">
  <div class="popup">
    <p>
      Ich stimme zu, dass mein Foto aufgenommen und auf 
      Social Media (insbesondere Instagram) veröffentlicht werden darf.
    </p>
    <button onclick="startCam()">Zustimmen</button>
  </div>
</div>

<div class="app">

  <div class="top">
    <div class="timer-box">
      <div class="dot"></div>
      <div class="timer" id="timer">00:00:00</div>
    </div>
  </div>

  <div class="card">
    <div class="date">MAY 8TH</div>
    <div class="title">CAM ON</div>
    <div class="sub">TEQUILA SUNRISE</div>
    <div class="sub">INTERNATIONAL MUSIC VIBES</div>
    <div class="brand">APARTMENT</div>
  </div>

</div>

<script src="https://upload-widget.cloudinary.com/global/all.js"></script>

<script>
/* TIMER */
let s = 0;
setInterval(()=>{
  s++;
  let h = String(Math.floor(s/3600)).padStart(2,'0');
  let m = String(Math.floor((s%3600)/60)).padStart(2,'0');
  let sec = String(s%60).padStart(2,'0');
  document.getElementById("timer").innerText = `${h}:${m}:${sec}`;
},1000);

/* KAMERA START */
function startCam(){
  document.getElementById("overlay").style.display="none";

  const widget = cloudinary.createUploadWidget({
    cloudName: "dh18ywkmb",
    uploadPreset: "camon_upload1",
    sources: ["camera"],
    multiple: false
  }, (error, result) => {
    if(result.event === "success"){
      alert("Foto erfolgreich gespeichert!");
    }
  });

  widget.open();
}
</script>

</body>
</html>
